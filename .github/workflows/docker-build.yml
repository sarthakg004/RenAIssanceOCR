# ============================================================
# RenAIssance — Docker Build & Push
# Builds backend + frontend in parallel
# Versioning: v3.0 → v3.1 → v3.2 → ... (ignores v1, v2)
# Tags pushed: image:v3.x  and  image:latest
# ============================================================

name: Docker Build & Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write   # required to create and push git tags

env:
  DOCKERHUB_USERNAME: saarthakg004
  BACKEND_IMAGE:  saarthakg004/renaissance-backend
  FRONTEND_IMAGE: saarthakg004/renaissance-frontend

jobs:
  # ── Compute next v3.x version (no tag push yet) ────────────
  # The git tag is only created AFTER both images build successfully.
  # This prevents a failed build from consuming a version number.
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
    steps:
      - name: Checkout (full history + all tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next v3.x version
        id: semver
        run: |
          git fetch --tags --force

          # Only consider tags that match exactly v3.<number> — ignore v1, v2, etc.
          LATEST=$(git tag --list 'v3.*' \
            | grep -E '^v3\.[0-9]+$' \
            | sort -V \
            | tail -n1)

          if [ -z "$LATEST" ]; then
            # No v3.x tag exists yet → start the series
            NEXT="v3.0"
          else
            # Extract the minor number with awk and increment
            MINOR=$(echo "$LATEST" | awk -F'.' '{print $2}')
            NEXT="v3.$((MINOR + 1))"
          fi

          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Computed next version: $NEXT"

  # ── Build backend ───────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ needs.version.outputs.version }}
            ${{ env.BACKEND_IMAGE }}:latest
          # GitHub Actions cache for BuildKit layers
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max
          # BuildKit provenance for supply chain security
          provenance: false

  # ── Build frontend ──────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ needs.version.outputs.version }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max
          provenance: false

  # ── Tag + Summary (only runs when BOTH builds succeed) ──────
  # Creating the git tag here ensures a failed build never wastes
  # a version number — re-running the workflow will recompute the
  # same version and retry the tag push.
  summary:
    runs-on: ubuntu-latest
    needs: [version, build-backend, build-frontend]
    if: always()
    steps:
      - name: Checkout (for tag push)
        if: needs.build-backend.result == 'success' && needs.build-frontend.result == 'success'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push version tag
        if: needs.build-backend.result == 'success' && needs.build-frontend.result == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags --force
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Authenticate remote with token
          git remote set-url origin \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}"

          # Only push the tag if it does not already exist
          if git rev-parse "${{ needs.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag ${{ needs.version.outputs.version }} already exists — skipping."
          else
            git tag "${{ needs.version.outputs.version }}"
            git push origin "${{ needs.version.outputs.version }}"
            echo "Pushed tag ${{ needs.version.outputs.version }}"
          fi

      - name: Build summary
        run: |
          echo "## Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| renaissance-backend  | ${{ needs.version.outputs.version }} | ${{ needs.build-backend.result }}  |" >> $GITHUB_STEP_SUMMARY
          echo "| renaissance-frontend | ${{ needs.version.outputs.version }} | ${{ needs.build-frontend.result }} |" >> $GITHUB_STEP_SUMMARY