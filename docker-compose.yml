# `version:` top-level key is obsolete under Compose v2 and emits a warning.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      # PaddleX / PaddleOCR model cache — persisted in the named volume below
      # so models are downloaded only once across container restarts.
      - PADDLE_PDX_MODEL_CACHE_HOME=/paddle_models
    volumes:
      - paddle_models:/paddle_models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # API keys are loaded if a .env file exists alongside this compose file.
    # `required: false` makes the file optional so the stack starts without it;
    # missing keys surface as per-feature errors in the UI instead.
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      # Longer start period: first-run model downloads can take several minutes.
      start_period: 180s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    # Gate frontend start on the backend being healthy, not just created —
    # avoids the first few API calls hitting a cold server.
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  # Named volume for PaddleOCR / PaddleX model weights.
  # Models are downloaded on the first run and reused on every subsequent run.
  paddle_models:
