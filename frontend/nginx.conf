server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ESM modules — Vite emits the bundled PDF.js worker as `.mjs`. Browsers
    # refuse to load module scripts/workers unless served with a JS MIME type;
    # nginx's default mime.types maps `.js` correctly but not `.mjs`. Re-include
    # the default mappings before overriding, or this block would replace them.
    include /etc/nginx/mime.types;
    types {
        application/javascript  mjs;
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        text/xml
        application/xml
        image/svg+xml;
}
