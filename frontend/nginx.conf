server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ESM modules — Vite emits the bundled PDF.js worker as `.mjs`. Browsers
    # refuse to load module scripts/workers unless served with a JS MIME type;
    # nginx's default mime.types maps `.js` correctly but not `.mjs`. Re-include
    # the default mappings before overriding, or this block would replace them.
    include /etc/nginx/mime.types;
    types {
        application/javascript  mjs;
    }

    # Reverse-proxy API calls to the FastAPI backend container. The frontend
    # issues same-origin `/api/...` requests (see src/config.js), so there is
    # no CORS and no hardcoded host. `^~` makes this prefix win over the
    # static-asset regex below. Using a variable + Docker's embedded DNS
    # resolver means nginx still starts if the backend is briefly down and
    # recovers automatically when it comes back (instead of failing config
    # load with "host not found in upstream").
    location ^~ /api/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $backend_upstream http://backend:8000;
        # $request_uri keeps the original path + query string intact, which
        # the variable form of proxy_pass would otherwise drop.
        proxy_pass $backend_upstream$request_uri;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # OCR / layout detection / model loading can take minutes.
        proxy_connect_timeout 60s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;

        # Matches backend MAX_UPLOAD_SIZE (100 MB) for PDF/image uploads.
        client_max_body_size 100m;

        # Stream responses instead of buffering large OCR payloads to disk.
        proxy_buffering off;
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        text/xml
        application/xml
        image/svg+xml;
}
